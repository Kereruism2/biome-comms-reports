<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biome Trust - Communications Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --green-dark: #1e3a1f; --cream: #faf7f2; --tan: #c8a97e; --text-light: #6b6b6b; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--green-dark);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .wrap { max-width: 640px; width: 100%; text-align: center; }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  h1 { font-size: 40px; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
  p { color: var(--text-light); margin-bottom: 32px; font-size: 15px; }
  .reports { display: grid; gap: 14px; }
  .report-link {
    display: block;
    background: white;
    border: 1px solid #e8e0d0;
    border-radius: 12px;
    padding: 22px 28px;
    text-decoration: none;
    color: inherit;
    text-align: left;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .report-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 18px rgba(0,0,0,0.06);
  }
  .report-link.disabled { opacity: 0.55; pointer-events: none; }
  .report-period { font-size: 18px; font-weight: 600; }
  .report-meta { font-size: 13px; color: var(--text-light); margin-top: 4px; }
  .report-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .report-tag.latest { background: #e8f0e3; color: #2d5a2e; }
  .report-tag.pending { background: #efe9dc; color: var(--text-light); }
  footer { margin-top: 40px; font-size: 12px; color: var(--text-light); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Biome Trust</div>
  <h1>Communications Reports</h1>
  <p>Quarterly Digital Reach Summaries — covering website, email, Instagram, LinkedIn, Facebook and X.</p>

  <div class="reports">
    <a class="report-link" href="Jan-Apr-2026/">
      <div class="report-period">Jan 24 – Apr 24, 2026 <span class="report-tag latest">Latest</span></div>
      <div class="report-meta">90-day digital reach summary</div>
    </a>
    <span class="report-link disabled">
      <div class="report-period">Nov 2025 – Jan 2026 <span class="report-tag pending">Not available</span></div>
      <div class="report-meta">Previous period</div>
    </span>
  </div>

  <footer>Updated quarterly · biometrust.earth</footer>
</div>
</body>
</html>
